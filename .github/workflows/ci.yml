name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  feature-powerset:
    name: Feature Combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      # Exclude `sdk` — building --features sdk requires the Vimba X SDK
      # installed on the host, which standard CI runners do not have.
      - run: cargo hack check --feature-powerset --workspace --exclude-features sdk

  toml-lint:
    name: TOML & Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli,typos-cli
      - run: taplo check
      - run: typos

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  shear:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear
      - run: cargo shear

  mutants:
    name: Mutation Testing (vmb-core, 100% gate)
    runs-on: ubuntu-latest
    # `vmb-core` is the only crate under the mutation gate — vmb-ffi is
    # SDK-dependent and verified on hardware-backed runners; vmb-fake
    # is test infrastructure; vmb is a thin facade. See Makefile and
    # .cargo/mutants.toml for the rationale.
    #
    # The full sweep (~90s on the current crate size) runs on every PR,
    # not just diff-scoped, so a PR that deletes a test which used to
    # kill a mutant on UNCHANGED code is rejected at PR time rather
    # than discovered post-merge.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Pre-build baseline tests
        run: cargo test --workspace --no-run
      - name: Run full mutation sweep on vmb-core
        # cargo-mutants exits 1 if any mutant is missed; that alone
        # already fails CI. The explicit assertion in the next step
        # turns the failure message into "score must be 100%, got N%"
        # so future readers see the contracted bar.
        #
        # `continue-on-error: true` so the assertion step always runs
        # and produces the contracted error message. Both steps must
        # pass for the job to succeed.
        continue-on-error: true
        id: sweep
        run: |
          mkdir -p target/mutants/vmb-core
          cargo mutants --package vmb-core \
            --timeout=120 --in-place \
            --baseline=skip --profile=mutants-bench \
            --output target/mutants/vmb-core
      - name: Assert 100% mutation score
        if: always()
        run: |
          DIR=target/mutants/vmb-core/mutants.out
          if [ ! -d "$DIR" ]; then
            echo "::error::mutants output directory missing — sweep did not run"
            exit 1
          fi
          C=$(wc -l < "$DIR/caught.txt"  | tr -d ' ')
          M=$(wc -l < "$DIR/missed.txt"  | tr -d ' ')
          U=$(wc -l < "$DIR/unviable.txt" 2>/dev/null | tr -d ' ' || echo 0)
          T=$(wc -l < "$DIR/timeout.txt"  2>/dev/null | tr -d ' ' || echo 0)
          TESTABLE=$((C + M))
          if [ "$TESTABLE" -eq 0 ]; then
            echo "::error::no testable mutants found — config or filter regression"
            exit 1
          fi
          SCORE=$(awk "BEGIN { printf \"%.1f\", $C * 100 / $TESTABLE }")
          echo "vmb-core mutation score: $SCORE% (caught=$C missed=$M unviable=$U timeout=$T)"
          if [ "$M" -ne 0 ] || [ "$T" -ne 0 ]; then
            echo "::error::vmb-core mutation score must be 100% — got $SCORE% with $M missed and $T timed-out mutants"
            echo ""
            echo "Missed mutants:"
            cat "$DIR/missed.txt" || true
            echo ""
            echo "Timed-out mutants:"
            cat "$DIR/timeout.txt" 2>/dev/null || true
            exit 1
          fi
          echo "::notice::vmb-core mutation score = 100.0% ($C caught, $U unviable)"
      - name: Upload mutants output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-output-vmb-core
          path: target/mutants/vmb-core/mutants.out/
          if-no-files-found: ignore
