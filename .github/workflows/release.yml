name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to (re)publish, e.g., 0.2.0. Skipped if already on crates.io.'
        required: true
        default: '0.2.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve target version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Target version: $version"

      # Publish every workspace member in dependency order. Each step is
      # idempotent: if the target version is already on crates.io the
      # publish is skipped. The 30s wait after each publish is crates.io's
      # documented propagation window — subsequent crates in the chain
      # pull from the registry and will otherwise fail with
      # "no matching package named `vmb-core` found".
      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN_RAW: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Defensive whitespace strip (see commit 662e9eb — trailing
          # newline in the secret value caused a confusing 401 error on
          # the v0.1.0 release).
          token="${CARGO_REGISTRY_TOKEN_RAW//[[:space:]]/}"
          echo "Token length: raw=${#CARGO_REGISTRY_TOKEN_RAW} stripped=${#token}"

          target="${{ steps.version.outputs.version }}"
          UA="GoCleverOrg/vmb-rs release workflow (https://github.com/GoCleverOrg/vmb-rs)"

          # Topological order:
          #   vmb-sys     — leaf, raw FFI
          #   vmb-core    — leaf, domain + port
          #   vmb-ffi     — depends on vmb-core + vmb-sys
          #   vmb-fake    — depends on vmb-core
          #   vmb         — facade, depends on vmb-core + vmb-ffi
          for crate in vmb-sys vmb-core vmb-ffi vmb-fake vmb; do
            echo ""
            echo "=== $crate ==="
            current=$(curl -fsS -A "$UA" "https://crates.io/api/v1/crates/$crate" 2>/dev/null \
              | jq -r '.crate.max_version // ""' || echo "")
            if [ "$current" = "$target" ]; then
              echo "::notice::$crate $target already on crates.io; skipping"
              continue
            fi
            echo "Publishing $crate $target (crates.io current: ${current:-none})"
            CARGO_REGISTRY_TOKEN="$token" cargo publish -p "$crate"
            # Wait for crates.io to index before the next crate (which
            # may depend on this one) tries to resolve it.
            echo "Waiting 30s for crates.io index propagation..."
            sleep 30
          done

          echo ""
          echo "All workspace crates published."
