[files]
# vmb-sys/src/bindings.rs is bindgen-generated from the Vimba X SDK
# headers. We cannot control identifier spelling (`isWriteable`,
# `Writeable`, ...) and regenerating bindings would overwrite any
# manual edits.
#
# vmb-sys/src/api.rs and vmb-sys/src/stubs.rs are hand-written but
# must mirror the generated C function signatures verbatim — including
# the `Writeable` / `writeable` spelling from `VmbC.h`.
extend-exclude = [
    "vmb-sys/src/bindings.rs",
    "vmb-sys/src/api.rs",
    "vmb-sys/src/stubs.rs",
]

[default.extend-words]
