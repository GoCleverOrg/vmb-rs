[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true
registries = []

[bans]
highlight = "all"
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace dev-deps are intentionally path-only (no version)
# to avoid publish-time dependency cycles between e.g. vmb-core and
# vmb-fake. cargo-deny treats `{ path = "..." }` as a wildcard; this
# knob narrows the rule so it still bans wildcards on external deps
# but tolerates the internal path-only ones.
allow-wildcard-paths = true

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"
