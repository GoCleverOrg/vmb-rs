# Files excluded from mutation testing.
#
# `vmb-sys/src/bindings.rs` is bindgen-generated — no hand-written logic
# to test; excluding drops ~34% of mutants (all trivially missed) from
# every run.
#
# `vmb-sys/src/stubs.rs` is a module of trivial `return 0` no-op stubs
# used only to construct `VmbApi::stub()` baselines in test code. Its
# functions have no observable behaviour beyond type-checking the
# expected signatures; mutating them cannot be distinguished by any
# test that cares about adapter-level logic (tests that rely on
# specific behaviour overwrite the function pointer before invoking
# the code under test).
exclude_globs = [
    "vmb-sys/src/bindings.rs",
    "vmb-sys/src/stubs.rs",
]

# `impl Drop for VmbApi` deliberately leaks the loaded `libloading::Library`
# via `std::mem::forget`. The mutation "replace drop body with ()" would
# remove the leak — which is the bug we are defending against — but that
# bug is only observable if a Vimba X transport-layer thread survives
# `VmbShutdown` and then tries to execute code in `libVmbC` after
# `dlclose`. We have no way to simulate this in unit tests without a real
# SDK install, so the mutant is unreachable by the test harness by
# design.
# Regex is anchored to the exact mutant name cargo-mutants assigns to
# this impl's drop method so future `VmbApi*` types (e.g. a future
# `VmbApiBuilder`) aren't silently excluded.
exclude_re = ["<impl Drop for VmbApi>::drop"]
